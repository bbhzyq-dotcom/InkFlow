<div id="settings-view" class="view-content">
    <div class="novel-manager">
        <div class="page-header">
            <h1 class="page-title">设置</h1>
        </div>
        
        <div class="grid grid-2">
            <div class="card">
                <h3 style="margin-bottom:16px;">AI 配置（默认模型）</h3>
                <div class="input-group">
                    <label>AI 提供商</label>
                    <select id="ai-provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>API Key（默认）</label>
                    <input type="password" id="api-key" placeholder="输入您的 API Key">
                </div>
                <div class="input-group">
                    <label>API 地址（自定义供应商用）</label>
                    <input type="text" id="base-url" placeholder="https://api.openai.com/v1">
                </div>
                <div class="input-group">
                    <label>默认模型</label>
                    <select id="ai-model">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                        <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                        <option value="deepseek-chat">DeepSeek Chat</option>
                        <option value="moonshot-v1-8k">Moonshot V1 8K</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="App.saveSettings()">保存配置</button>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:16px;">多模型路由</h3>
                <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">
                    为不同 Agent 分配不同的模型，可平衡质量与成本。
                </p>
                
                <div style="margin-bottom:16px;">
                    <h4 style="font-size:13px;margin-bottom:8px;">Writer Agent（写作）</h4>
                    <div class="input-group">
                        <label>模型</label>
                        <select id="model-writer">
                            <option value="">使用默认</option>
                            <option value="gpt-4o">GPT-4o（推荐）</option>
                            <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                            <option value="deepseek-chat">DeepSeek Chat</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-bottom:16px;">
                    <h4 style="font-size:13px;margin-bottom:8px;">Auditor Agent（审计）</h4>
                    <div class="input-group">
                        <label>模型</label>
                        <select id="model-auditor">
                            <option value="">使用默认</option>
                            <option value="gpt-4o-mini">GPT-4o Mini（推荐）</option>
                            <option value="gpt-4o">GPT-4o</option>
                            <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-bottom:16px;">
                    <h4 style="font-size:13px;margin-bottom:8px;">Architect Agent（规划）</h4>
                    <div class="input-group">
                        <label>模型</label>
                        <select id="model-architect">
                            <option value="">使用默认</option>
                            <option value="gpt-4o">GPT-4o（推荐）</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                            <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn btn-secondary" onclick="App.saveModelRouting()">保存路由配置</button>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:16px;">写作偏好</h3>
                <div class="input-group">
                    <label>默认小说类型</label>
                    <select id="default-genre">
                        <option value="xuanhuan">玄幻</option>
                        <option value="xianxia">仙侠</option>
                        <option value="urban">都市</option>
                        <option value=" sci-fi">科幻</option>
                        <option value="horror">恐怖</option>
                        <option value="romance">言情</option>
                        <option value="litpg">游戏</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>每章目标字数</label>
                    <input type="number" id="default-chapter-words" value="3000" min="1000" max="10000">
                </div>
                <div class="input-group">
                    <label>写作风格</label>
                    <select id="default-style">
                        <option value="normal">正常</option>
                        <option value="compact">紧凑</option>
                        <option value="flowery">华丽</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="App.saveSettings()">保存偏好</button>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:16px;">通知设置</h3>
                <div class="input-group">
                    <label>
                        <input type="checkbox" id="notify-enabled"> 启用写作完成通知
                    </label>
                </div>
                <div class="input-group">
                    <label>通知方式</label>
                    <select id="notify-method">
                        <option value="none">无</option>
                        <option value="telegram">Telegram</option>
                        <option value="feishu">飞书</option>
                        <option value="webhook">Webhook</option>
                    </select>
                </div>
                <div class="input-group" id="notify-config" style="display:none;">
                    <label>配置</label>
                    <input type="text" id="notify-token" placeholder="Token / Webhook URL">
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:16px;">主题</h3>
                <div class="input-group">
                    <label>界面主题</label>
                    <select id="theme-select">
                        <option value="light">浅色</option>
                        <option value="dark">深色</option>
                        <option value="system">跟随系统</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top:20px;">
            <h3 style="margin-bottom:16px;">模型路由说明</h3>
            <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
                <p><strong>Writer（写作）：</strong>负责生成正文，建议使用高质量模型如 GPT-4o 或 Claude 3.5 Sonnet</p>
                <p><strong>Auditor（审计）：</strong>负责检查质量，可以使用较便宜的模型如 GPT-4o Mini</p>
                <p><strong>Architect（规划）：</strong>负责章节结构规划，建议使用中等质量模型</p>
                <p><strong>Radar（趋势）：</strong>可选本地模型或直接使用默认设置</p>
            </div>
        </div>
    </div>
</div>
