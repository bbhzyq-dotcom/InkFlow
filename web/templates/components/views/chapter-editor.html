<div id="chapter-editor-view" class="view-content">
    <div class="chapter-editor">
        <div class="editor-header">
            <h2 class="editor-title" id="editor-novel-title">选择一本小说</h2>
            <div class="editor-toolbar">
                <button class="btn btn-outline" onclick="App.saveChapter()">保存</button>
                <button class="btn btn-primary" onclick="App.aiWriteChapter()" id="btn-ai-write">AI 续写</button>
            </div>
        </div>
        
        <div id="writing-progress" class="writing-progress-overlay" style="display:none;">
            <div class="writing-progress-content">
                <div class="progress-header">InkOS 核心创作中</div>
                <div class="progress-bar-large">
                    <div class="progress-fill-large" id="writing-progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">准备中...</div>
                <div class="progress-log" id="progress-log"></div>
            </div>
        </div>
        
        <div class="editor-container">
            <div class="editor-main">
                <div class="editor-tabs">
                    <button class="editor-tab active" data-tab="write">编辑</button>
                    <button class="editor-tab" data-tab="preview">预览</button>
                    <button class="editor-tab" data-tab="outline">大纲</button>
                </div>
                <div class="editor-content">
                    <textarea class="editor-textarea" id="chapter-content" placeholder="开始写作，或点击「AI 续写」让 InkOS 核心帮您创作..."></textarea>
                    <div class="editor-preview" id="chapter-preview" style="display:none;"></div>
                </div>
            </div>
            
            <div class="editor-sidebar">
                <div class="sidebar-panel">
                    <div class="panel-header">章节列表</div>
                    <div class="panel-body">
                        <div class="chapter-list" id="chapter-list">
                            <div class="chapter-item">
                                <div class="chapter-num">1</div>
                                <div class="chapter-info">
                                    <div class="chapter-title">第一章 起点</div>
                                    <div class="chapter-words">3,000 字</div>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-outline" style="width:100%;margin-top:12px;" onclick="App.addChapter()">+ 新建章节</button>
                    </div>
                </div>
                
                <div class="sidebar-panel">
                    <div class="panel-header">写作状态</div>
                    <div class="panel-body">
                        <div class="ai-status">
                            <div class="status-item">
                                <span class="status-label">当前章节</span>
                                <span class="status-value" id="current-chapter-num">-</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">章节字数</span>
                                <span class="status-value" id="current-chapter-words">0</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">AI 引擎</span>
                                <span class="status-value success" id="ai-engine-status">就绪</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">伏笔回收</span>
                                <span class="status-value" id="hook-recovery">0%</span>
                            </div>
                        </div>
                        <div class="write-progress">
                            <div class="status-item">
                                <span class="status-label">创作进度</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="writing-progress-bar" style="width: 0%;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="sidebar-panel">
                    <div class="panel-header">AI 写作设置</div>
                    <div class="panel-body">
                        <div class="input-group">
                            <label>目标字数</label>
                            <input type="number" id="target-words" value="3000" min="1000" max="10000">
                        </div>
                        <div class="input-group">
                            <label>写作风格</label>
                            <select id="writing-style">
                                <option value="normal">正常</option>
                                <option value="compact">紧凑</option>
                                <option value="flowery">华丽</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>小说类型</label>
                            <select id="novel-genre">
                                <option value="xuanhuan">玄幻</option>
                                <option value="xianxia">仙侠</option>
                                <option value="urban">都市</option>
                                <option value="sci-fi">科幻</option>
                                <option value="horror">恐怖</option>
                                <option value="romance">言情</option>
                                <option value="litpg">游戏</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" style="width:100%;" onclick="App.aiWriteChapter()" id="btn-ai-write-sidebar">
                            开始 AI 续写
                        </button>
                    </div>
                </div>

                <div class="sidebar-panel">
                    <div class="panel-header">局部干预</div>
                    <div class="panel-body">
                        <div class="input-group">
                            <label>选中内容</label>
                            <div class="selected-info" id="selected-info">未选中任何内容</div>
                        </div>
                        <div class="input-group">
                            <label>修改指令</label>
                            <select id="partial-instruction">
                                <option value="">自定义指令</option>
                                <option value="重写这段，使其更紧张刺激">更紧张刺激</option>
                                <option value="重写这段，增加更多细节描写">增加细节描写</option>
                                <option value="重写这段，对话更自然">对话更自然</option>
                                <option value="重写这段，减少冗余">减少冗余</option>
                                <option value="重写这段，增加伏笔">增加伏笔</option>
                                <option value="重写这段，风格更简洁">风格更简洁</option>
                            </select>
                        </div>
                        <div class="input-group" id="custom-instruction-group" style="display:none;">
                            <input type="text" id="custom-instruction" placeholder="输入自定义指令...">
                        </div>
                        <button class="btn btn-warning" style="width:100%;" onclick="App.partialRewrite()" id="btn-partial-rewrite">
                            重写选中内容
                        </button>
                    </div>
                </div>

                <div class="sidebar-panel">
                    <div class="panel-header">真相文件</div>
                    <div class="panel-body">
                        <div class="truth-summary" id="truth-summary">
                            <div class="status-item">
                                <span class="status-label">当前章节</span>
                                <span class="status-value" id="truth-chapter">-</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">活跃伏笔</span>
                                <span class="status-value" id="truth-hooks">0</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">跟踪角色</span>
                                <span class="status-value" id="truth-characters">0</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">章节摘要</span>
                                <span class="status-value" id="truth-summaries">0</span>
                            </div>
                        </div>
                        <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="App.cascadeUpdate()">
                            级联更新真相文件
                        </button>
                    </div>
                </div>
                
                <div class="sidebar-panel">
                    <div class="panel-header">快捷操作</div>
                    <div class="panel-body">
                        <div style="display:flex;flex-direction:column;gap:8px;">
                            <button class="btn btn-outline" style="width:100%;" onclick="App.saveChapter()">保存当前章节</button>
                            <button class="btn btn-outline" style="width:100%;" onclick="App.showAddChapterModal()">新建章节</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="add-chapter-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content card">
        <div class="modal-header">
            <h3>新建章节</h3>
            <button class="btn-close" onclick="App.closeAddChapterModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>章节标题（留空自动生成）</label>
                <input type="text" id="new-chapter-title" placeholder="输入章节标题，可留空">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="App.closeAddChapterModal()">取消</button>
            <button class="btn btn-primary" onclick="App.addChapterFromModal()">创建</button>
        </div>
    </div>
</div>
